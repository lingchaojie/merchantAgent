services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU20-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "${M7_SQLSERVER_SA_PASSWORD:-M7SqlServer!Local2026}"
    ports:
      - "127.0.0.1:11433:1433"
    volumes:
      - ./mssql.conf:/var/opt/mssql/mssql.conf:ro
      - ./tls:/var/opt/mssql/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
  initializer:
    image: mcr.microsoft.com/mssql/server:2022-CU20-ubuntu-22.04
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${M7_SQLSERVER_SA_PASSWORD:-M7SqlServer!Local2026}"
    network_mode: service:sqlserver
    volumes:
      - ./init.sql:/fixture/init.sql:ro
    entrypoint:
      - /bin/bash
      - -ec
      - |
        until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" -b -o /dev/null; do sleep 2; done
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -b -i /fixture/init.sql
